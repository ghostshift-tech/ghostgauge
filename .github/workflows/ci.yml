name: CI
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Lint
        run: uvx ruff check .
      - name: Test
        run: uv run --with pytest --with httpx --with keyring python -m pytest tests/ -q
